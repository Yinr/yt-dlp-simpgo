name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ""
            ldflags: "-s -w"
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            suffix: ".exe"
            ldflags: "-s -w -H=windowsgui"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: ""
            ldflags: "-s -w"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: ""
            ldflags: "-s -w"

    runs-on: ${{ matrix.os }}
    env:
      EXECUTABLE: yt-dlp-simpgo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libgtk-3-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev pkg-config

      - name: Install Windows cross-compiler
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: |
          VERSION=${{ steps.tag.outputs.tag }}
          LDFLAGS="-X 'main.Version=${VERSION}' ${{ matrix.ldflags }}"
          OUTPUT=dist/${{ env.EXECUTABLE }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go run github.com/akavel/rsrc@v0.10.2 -ico res/icon.ico -arch ${{ matrix.goarch }} -o rsrc_windows_${{ matrix.goarch }}.syso
            CC=x86_64-w64-mingw32-gcc CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -o "$OUTPUT" -ldflags "$LDFLAGS"
          else
            CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -o "$OUTPUT" -ldflags "$LDFLAGS"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXECUTABLE }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
